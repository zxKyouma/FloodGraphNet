# Reconstructed public-use config based on the surviving Model 2 XGBoost config
# and historical experiment logs for Model 1.
dataset_parameters:
  dataset_type: csv
  storage_mode: disk
  root_dir: Models/Model_1
  file_prefix: ''
  static_dir: null
  features_stats_file: csv_features_stats.yaml
  build_data_list: false
  mask_future_inputs: true
  random_window_sampling: true
  random_window_seed: 42
  node_derived_features_enabled: true
  node_derived_feature_windows: [1, 2, 3, 5, 8, 10]
  node_derived_rain_windows: [1, 2, 4, 6, 8, 10]
  node_derived_rain_max_windows: [1, 2, 4, 6, 8, 10, 12, 24]
  node_derived_rain_decay_alphas: [0.7, 0.85, 0.9, 0.95, 0.97, 0.99]
  node_derived_interactions_enabled: true
  node_derived_interaction_static_features: ['area', 'flow_accumulation', 'centroid_elevation', 'base_area', 'invert_elevation', 'surface_elevation', 'depth']
  previous_timesteps: 9
  warm_start_timesteps: 10
  warn_on_warm_start: false
  normalize: true
  timestep_interval: null
  spin_up_time: null
  time_from_peak: null
  inflow_boundary_nodes: []
  outflow_boundary_nodes: []
  training:
    dataset_summary_file: train/events.csv
    event_stats_file: train_event_stats.yaml
  testing:
    dataset_summary_file: test/events.csv
    event_stats_file: test_event_stats.yaml
training_parameters:
  log_path: training_logs/model1_best
  model_dir: saved_models/model1_best
  stats_dir: training_stats/model1_best
  checkpoint_path: null
  checkpoint_save_path: saved_models/checkpoints/model1_best_{timestamp}/last.pt
  checkpoint_every: 5
  best_checkpoint_path: saved_models/checkpoints/model1_best_{timestamp}/best.pt
  num_epochs: 100
  num_epochs_dyn_loss: 0
  batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-03
  optimizer_type: adamw
  adam_weight_decay: 0
  gradient_clip_value: 1.0
  pred_delta_clip_value: null
  use_amp: true
  amp_dtype: bf16
  enable_tf32: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  dataloader_persistent_workers: false
  dataloader_prefetch_factor: 2
  debug_loss_stats: true
  early_stopping_patience: 10
  val_split_percent: 0.2
  split_seed: 42
  autoregressive:
    enabled: true
    init_num_timesteps: 108
    total_num_timesteps: 108
    dynamic_label_horizon: true
    timestep_increment: 0
    max_curriculum_epochs: null
    learning_rate_decay: 0.9
    lr_scheduler:
      type: cosine
      min_lr: 1.0e-05
      warmup_epochs: 2
      warmup_start_factor: 0.1
    scheduled_sampling_start: 1.0
    scheduled_sampling_end: 1.0
    scheduled_sampling_decay_epochs: 0
    rollout_state_loss:
      enabled: false
      weight: 0.0
      horizon: 108
      terminal_only: false
    kaggle_sequence_loss:
      enabled: true
      weight: 0.7
      mask_horizon: 108
      mask_schedule:
        - [0, 108]
      type1_weight: 6.0
      type2_weight: 1.0
      peak_weight:
        enabled: false
        alpha: 2.0
        alpha_schedule:
        - [0, 2.0]
        clip: 2.5
        quantile: 0.9
      asymmetric:
        enabled: false
        type1_only: false
        event_only: true
        event_quantile: 0.95
        under_weight: 4.0
      event_tail:
        enabled: false
        quantile: 0.95
        weight: 1.0
        type1_only: false
    late_delta_penalty:
      enabled: false
      weight: 0.0
      start_horizon: 224
      type1_only: true
    horizon_weight_ramp:
      enabled: false
      type1_only: true
      start_horizon: 224
      power: 2.0
      alpha: 0.0
    event_dy_loss:
      enabled: false
      weight: 0.0
      type1_only: true
      event_only: true
      peak_weight: 12.0
      peak_quantile: 0.90
      peak_dilate: 2
    inlet_aux_loss:
      enabled: true
      weight: 0.20
      type1_only: true
      event_weight: 10.0
      event_quantile: 0.95
      tail_quantile: 0.98
      tail_weight: 5.0
      max_weight: 20.0
    node_type_loss_weights:
      type1: 1.5
      type2: 1.0
    direct_multi_horizon:
      enabled: true
      horizon: 108
loss_func_parameters:
  node_loss: huber
  edge_loss: mse
  node_loss_weight: 1.0
  edge_pred_loss_scale: 1.0
  edge_loss_weight: 0.0
  use_global_mass_loss: false
  global_mass_loss_scale: 1.0e-05
  global_mass_loss_weight: 0.01
  use_local_mass_loss: true
  local_mass_loss_scale: 1.0e-05
  local_mass_loss_weight: 0.0
  late_step_weighting:
    enabled: false
    lambda: 0.0
    mode: linear
  huber:
    delta: 0.15
testing_parameters:
  log_path: null
  output_dir: saved_metrics
  rollout_start: 10
  rollout_timesteps: 108
  stability: false
  validation_use_tester: true
  validation_one_step_loss: false
  validation_zero_delta_baseline: false
  validation_log_rollout_rmse_curve: false
  validation_debug_val_nan: false
  validation_debug_tester: false
  validation_max_events: -1
  validation_max_events_seed: 42
  validation_hybrid_sliding_window: false
  validation_hybrid_stride: 36
  validation_hybrid_every: 10
  validation_pred_delta_clip_value: null
  validation_direct_multi_horizon: true
  validation_diag_kaggle_breakdown: true
  validation_rmse_bucket_edges: [0, 36, 72, 108]
  validation_full_eval_on_end: false
  sigma_freeze: 0.0
  sigma_soft: 0.0
  sigma_k: 5.0
  sigma_hard_freeze: 0.0
  hard_freeze_warmup_sigma: 0.0
  hard_freeze_round: null
  stability_anchor: last
  teacher_forcing: false
  postprocess_eval_on_train_end: false
model_parameters:
  DUALFloodGNN:
    hidden_features: 64
    num_layers: 3
    activation: relu
    residual: true
    mlp_layers: 3
    encoder_layers: 3
    encoder_activation: relu
    decoder_layers: 3
    decoder_activation: relu
  DUALFloodGNNv2:
    hidden_features: 64
    num_layers: 3
    activation: relu
    residual: true
    mlp_layers: 3
    encoder_layers: 3
    encoder_activation: relu
    decoder_layers: 3
    decoder_activation: relu
  NodeGNN:
    hidden_features: 64
    num_layers: 3
    activation: relu
    mlp_layers: 3
    residual: true
    encoder_layers: 2
    encoder_activation: relu
